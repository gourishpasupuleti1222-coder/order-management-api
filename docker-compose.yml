services:
  postgres:
    image: postgres:16
    container_name: order_management_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_management_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d order_management_db"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: order_management_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: order_management_migrate

    env_file:
      - .env.docker

    command:
      [
        "python",
        "-m",
        "alembic",
        "upgrade",
        "head"
      ]

    depends_on:
      postgres:
        condition: service_healthy

    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: order_management_api
    restart: unless-stopped

    env_file:
      - .env.docker

    ports:
      - "8000:8000"

    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: order_management_celery
    restart: unless-stopped

    env_file:
      - .env.docker

    command:
      [
        "celery",
        "-A",
        "app.celery_worker.celery_app",
        "worker",
        "--loglevel=info"
      ]

    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: